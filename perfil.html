<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Perfil - Tem no Entorno Sul</title>
  <link rel="icon" type="image/png" href="https://i.imgur.com/9eZarki.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    /* Estilos adicionais para o perfil */
    .dashboard-btn-container {
      text-align: center;
      margin-bottom: 30px;
    }
    .btn-dashboard {
      background: var(--laranja);
      color: var(--branco);
      padding: 12px 30px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      display: inline-block;
      transition: transform 0.2s;
    }
    .btn-dashboard:hover {
      transform: translateY(-2px);
      background: #e59400;
    }
    .edit-mode {
      display: none;
    }
    .edit-mode.active {
      display: block;
    }
    .action-buttons {
      text-align: center;
      margin-top: 30px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--cinza-medio);
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="container">
    <div id="perfil-content" class="perfil-container">
      <div class="loading-spinner"></div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script type="module">
    import { carregarHeader } from '../componentes/header.js';
    import { carregarFooter } from '../componentes/footer.js';
    import { supabase } from '../js/supabase-config.js';

    carregarHeader();
    carregarFooter();

    let usuarioAtual = null;
    let perfilAtual = null;
    let parceiroAtual = null;

    async function carregarDados() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        window.location.href = '../admin/login.html';
        return;
      }
      usuarioAtual = session.user;

      const { data: profile } = await supabase
        .from('profiles')
        .select('*')
        .eq('id', usuarioAtual.id)
        .single();
      perfilAtual = profile;

      if (perfilAtual?.tipo_usuario === 'comercio') {
        const { data: parceiro } = await supabase
          .from('parceiros')
          .select('*')
          .eq('user_id', usuarioAtual.id)
          .single();
        parceiroAtual = parceiro;
      }

      renderizarPerfil();
    }

    function renderizarPerfil() {
      const container = document.getElementById('perfil-content');
      const avatar = perfilAtual?.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(perfilAtual?.nome || 'Usuário')}&background=256d3c&color=fff&bold=true`;
      const tipoLabel = {
        admin: 'Administrador',
        colunista: 'Colunista',
        comercio: 'Parceiro Comercial'
      }[perfilAtual?.tipo_usuario] || 'Usuário';

      container.innerHTML = `
        <div class="perfil-card">
          <div class="perfil-header">
            <img src="${avatar}" class="perfil-avatar">
            <h1>${perfilAtual?.nome || 'Usuário'}</h1>
            <p class="perfil-email">${usuarioAtual.email}</p>
            <span class="perfil-badge">${tipoLabel}</span>
            ${parceiroAtual?.plano === 'premium' ? '<span class="perfil-badge premium">⭐ Premium</span>' : ''}
          </div>
          <div class="perfil-body">
            ${window.dashboardUrl ? `
              <div class="dashboard-btn-container">
                <a href="${window.dashboardUrl}" class="btn-dashboard">
                  <i class="fas fa-tachometer-alt"></i> Ir para Dashboard
                </a>
              </div>
            ` : ''}

            <div id="viewMode">
              <div class="info-section">
                <h3>Informações Pessoais</h3>
                <div class="info-grid">
                  <div class="info-row"><div class="info-label">Nome</div><div class="info-value" id="viewNome">${perfilAtual?.nome || '-'}</div></div>
                  <div class="info-row"><div class="info-label">E-mail</div><div class="info-value">${usuarioAtual.email}</div></div>
                  <div class="info-row"><div class="info-label">Telefone</div><div class="info-value" id="viewTelefone">${perfilAtual?.telefone || 'Não informado'}</div></div>
                </div>
              </div>
              <div class="action-buttons">
                <button id="btnEditar" class="btn btn-primary">Editar Perfil</button>
              </div>
            </div>

            <div id="editMode" class="edit-mode">
              <div class="info-section">
                <h3>Editar Informações</h3>
                <form id="editForm">
                  <div class="form-group">
                    <label>Nome completo</label>
                    <input type="text" id="editNome" value="${perfilAtual?.nome || ''}" required>
                  </div>
                  <div class="form-group">
                    <label>Telefone</label>
                    <input type="tel" id="editTelefone" value="${perfilAtual?.telefone || ''}" placeholder="(61) 99999-9999">
                  </div>
                  <div class="action-buttons">
                    <button type="submit" class="btn btn-primary">Salvar alterações</button>
                    <button type="button" id="btnCancelar" class="btn btn-outline">Cancelar</button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      `;

      document.getElementById('btnEditar')?.addEventListener('click', () => {
        document.getElementById('viewMode').style.display = 'none';
        document.getElementById('editMode').classList.add('active');
      });

      document.getElementById('btnCancelar')?.addEventListener('click', () => {
        document.getElementById('editMode').classList.remove('active');
        document.getElementById('viewMode').style.display = 'block';
      });

      document.getElementById('editForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const nome = document.getElementById('editNome').value.trim();
        const telefone = document.getElementById('editTelefone').value.trim();

        const { error } = await supabase
          .from('profiles')
          .update({ nome, telefone: telefone || null })
          .eq('id', usuarioAtual.id);

        if (error) {
          alert('Erro ao atualizar perfil');
          return;
        }

        alert('Perfil atualizado com sucesso!');
        document.getElementById('editMode').classList.remove('active');
        document.getElementById('viewMode').style.display = 'block';
        carregarDados(); // recarrega
      });
    }

    carregarDados();
  </script>
</body>
</html>
