<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const SUPABASE_URL = "https://flidbkfrfosuahgphiza.supabase.co";
const SUPABASE_KEY = "sb_publishable_mCBYSpZc45Pw345wZ1coEA_rYL61Ea8";

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

async function testarConexao(){

    const status = document.getElementById("status");
    const resultado = document.getElementById("resultado");

    try{

        const { data, error } = await supabase
        .from("empresas")
        .select("*")
        .limit(5);

        if(error){

            status.innerHTML = "Erro ao consultar banco";
            resultado.innerText = JSON.stringify(error,null,2);
            return;
        }

        status.innerHTML = "Conexão OK com Supabase!";
        resultado.innerText = JSON.stringify(data,null,2);

    }
    catch(e){

        status.innerHTML = "Erro de conexão";
        resultado.innerText = e;

    }

}

testarConexao();

</script>
