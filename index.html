<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teste Supabase - Tem no Entorno Sul</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f4f4f4;
    padding:40px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
    color:#216b39;
}

.status{
    padding:15px;
    border-radius:6px;
    margin-bottom:20px;
}

.ok{
    background:#e6ffed;
    border:1px solid #2ecc71;
}

.erro{
    background:#ffe6e6;
    border:1px solid #e74c3c;
}

pre{
    background:#222;
    color:#00ff9c;
    padding:20px;
    border-radius:6px;
    overflow:auto;
}

</style>

</head>

<body>

<div class="container">

<h1>Teste de Conexão com Supabase</h1>

<div id="status" class="status">
Conectando...
</div>

<h2>Dados retornados:</h2>

<pre id="resultado">
Aguardando resposta...
</pre>

</div>

<!-- Biblioteca oficial do Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

/* ==========================
CONFIGURAÇÃO DO SUPABASE
========================== */

const SUPABASE_URL = "sb_publishable_KR-fJPXlPB2Ehw5Cv3171Q_MX9EfOig";
const SUPABASE_KEY = "sb_secret_LE-TY
••••••••••••••••";

/* ==========================
CRIANDO CLIENTE SUPABASE
========================== */

const supabase = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);


/* ==========================
TESTE DE CONSULTA
========================== */

async function testarConexao(){

    const status = document.getElementById("status");
    const resultado = document.getElementById("resultado");

    try{

        /* CONSULTA NA TABELA
           TROQUE "empresas"
           por uma tabela existente no seu banco
        */

        const { data, error } = await supabase
        .from("empresas")
        .select("*")
        .limit(5);

        if(error){

            status.className="status erro";
            status.innerText="Erro ao conectar no Supabase.";

            resultado.innerText = JSON.stringify(error,null,2);

            return;
        }

        status.className="status ok";
        status.innerText="Conexão realizada com sucesso!";

        resultado.innerText = JSON.stringify(data,null,2);

    }
    catch(e){

        status.className="status erro";
        status.innerText="Falha na conexão.";

        resultado.innerText = e;

    }

}

/* ==========================
EXECUTA TESTE
========================== */

testarConexao();

</script>

</body>
</html>
